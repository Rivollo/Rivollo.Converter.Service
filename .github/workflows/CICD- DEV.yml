name: CI - Build & Push Docker Image to ACR (Development)
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: Dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set tags
        id: tags
        run: |
          TAG_NUM="build-${GITHUB_RUN_NUMBER}"
          TAG_LATEST="latest"
          echo "TAG_NUM=${TAG_NUM}"       >> $GITHUB_ENV
          echo "TAG_LATEST=${TAG_LATEST}" >> $GITHUB_ENV
          echo "IMAGE_NUM=${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}:${TAG_NUM}"       >> $GITHUB_ENV
          echo "IMAGE_LATEST=${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}:${TAG_LATEST}" >> $GITHUB_ENV
          echo "Using numeric tag: ${TAG_NUM}"
          echo "IMAGE_NUM set to: ${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}:${TAG_NUM}"

      - name: Build and push (both numeric and latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NUM }}
            ${{ env.IMAGE_LATEST }}

      - name: Print pushed image digests (traceability)
        run: |
          echo "GIT_COMMIT=${GITHUB_SHA}"
          echo "Pulling numeric tag: ${{ env.IMAGE_NUM }}"
          docker pull "${{ env.IMAGE_NUM }}"
          echo "Numeric image repo digests:"
          docker inspect --format='{{index .RepoDigests 0}}' "${{ env.IMAGE_NUM }}" || true
          echo "Pulling latest: ${{ env.IMAGE_LATEST }}"
          docker pull "${{ env.IMAGE_LATEST }}"
          echo "Latest image repo digests:"
          docker inspect --format='{{index .RepoDigests 0}}' "${{ env.IMAGE_LATEST }}" || true
